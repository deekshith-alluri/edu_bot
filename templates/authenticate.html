
<!-- ================= authenticate.html ================= -->
{% extends "base.html" %}
{% block title %}Authenticate{% endblock %}
{% block content %}
<div class="container">
  <div class="card">

    <div class="toggle">
      <span id="loginTab" class="active" onclick="showLogin()">Login</span>
      <span id="registerTab" onclick="showRegister()">Register</span>
    </div>

    <div class="form-wrapper" id="formWrapper">

      <!-- LOGIN -->
      <div class="form">
        <h3>Login</h3>
        <input id="loginUser" placeholder="Username">
        <input id="loginPass" type="password" placeholder="Password">
        <button style="width:100%;" onclick="login()">Login</button>
      </div>

      <!-- REGISTER -->
      <div class="form">
        <h3>Register</h3>
        <input id="regUser" placeholder="Username">
        <input id="regPass" type="password" placeholder="Password">
        <button style="width:100%;" onclick="register()">Register</button>
      </div>

    </div>
  </div>
</div>

<script>
const wrapper = document.getElementById('formWrapper');

function showRegister(){
  wrapper.style.transform = 'translateX(-50%)';
  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('registerTab').classList.add('active');
}

function showLogin(){
  wrapper.style.transform = 'translateX(0%)';
  document.getElementById('registerTab').classList.remove('active');
  document.getElementById('loginTab').classList.add('active');
}

async function login(){
  const res = await fetch('/authenticate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:document.getElementById('loginUser').value,
      password:document.getElementById('loginPass').value
    })
  });

  if(res.ok) window.location='/';
  else alert('Login failed');
}

async function register(){
  const res = await fetch('/authenticate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      username:document.getElementById('regUser').value,
      password:document.getElementById('regPass').value
    })
  });

  if(res.ok){
    alert('Registered successfully! Please login.');
    showLogin();
  } else {
    alert('Registration failed');
  }
}
</script>
{% endblock %}
