<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Spark | Authenticate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .auth-container {
            min-height: calc(100vh - 80px);
        }
        .form-switcher {
            display: none;
        }
        .form-switcher.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }
    </style>
</head>
<body class="transition-colors duration-300">

    <div id="navbar-container"></div>

    <div class="auth-container flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-md p-8 relative overflow-hidden">
            
            <!-- Background Decoration -->
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-indigo-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-purple-500 rounded-full mix-blend-multiply filter blur-2xl opacity-20"></div>

            <!-- Header -->
            <div class="text-center mb-8 relative z-10">
                <h2 class="text-3xl font-bold mb-2" id="auth-title">Welcome Back</h2>
                <p class="text-slate-500" id="auth-subtitle">Continue your learning journey</p>
                
                <div class="flex justify-center mt-6 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg w-max mx-auto">
                    <button onclick="switchMode('login')" id="btn-login-tab" class="px-6 py-2 rounded-md font-medium transition-all bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400">Login</button>
                    <button onclick="switchMode('register')" id="btn-register-tab" class="px-6 py-2 rounded-md font-medium text-slate-500 hover:text-slate-700 dark:hover:text-slate-300 transition-all">Register</button>
                </div>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="form-switcher active relative z-10" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" class="form-control" placeholder="john_doe" required>
                </div>
                <div class="form-group mb-6">
                    <label>Password</label>
                    <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-full py-3 justify-center text-lg shadow-md shadow-indigo-500/20" id="login-submit-btn">
                    Login
                </button>
            </form>

            <!-- Register Form Flow -->
            <div id="form-register-flow" class="form-switcher relative z-10">
                
                <!-- Step 1: Username check -->
                <div id="register-step-1">
                    <div class="form-group mb-6">
                        <label>Choose a Username</label>
                        <input type="text" id="reg-username" class="form-control" placeholder="super_student" required>
                    </div>
                    <button type="button" class="btn-primary w-full py-3 justify-center text-lg" onclick="checkUsername()">
                        Continue
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </div>

                <!-- Step 2: Full Form -->
                <form id="register-step-2" style="display:none;" onsubmit="handleRegister(event)">
                    <div class="text-sm font-medium text-success-color mb-4 bg-emerald-50 dark:bg-emerald-900/30 p-2 rounded flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                        Username <span id="username-display" class="font-bold"></span> is available!
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="reg-first" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="reg-last" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" class="form-control" required>
                    </div>

                    <div class="form-group mb-4">
                        <label>Password <span class="text-error-color">*</span></label>
                        <input type="password" id="reg-password" class="form-control" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="form-group">
                            <label>Gender <span class="text-error-color">*</span></label>
                            <select id="reg-gender" class="form-control bg-transparent" required>
                                <option value="" disabled selected>Select Gender</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Class of Study</label>
                            <input type="text" id="reg-class" class="form-control" placeholder="10th Grade">
                        </div>
                    </div>

                    <div class="form-group mt-4">
                        <label>Date of Birth <span class="text-error-color">*</span></label>
                        <input type="date" id="reg-dob" class="form-control" required>
                    </div>

                    <div class="text-sm text-slate-500 mb-6">
                        <div class="font-medium mb-2">Additional Information</div>
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <input type="text" id="reg-country" class="form-control py-2 text-sm" placeholder="Country *" required>
                            <input type="text" id="reg-state" class="form-control py-2 text-sm" placeholder="State">
                            <input type="text" id="reg-school" class="form-control py-2 text-sm" placeholder="School" class="col-span-2">
                            <input type="text" id="reg-board" class="form-control py-2 text-sm" placeholder="Board of Education *" required>
                            <input type="text" id="reg-phone" class="form-control py-2 text-sm col-span-2" placeholder="Phone Number">
                        </div>
                    </div>

                    <button type="submit" class="btn-primary w-full py-3 justify-center text-lg shadow-md shadow-indigo-500/20" id="reg-submit-btn">
                        Create Account
                    </button>
                    <button type="button" class="w-full text-center mt-3 text-sm text-slate-500 hover:text-indigo-500" onclick="resetRegisterPath()">Cancel</button>
                </form>

            </div>

        </div>
    </div>

    <script src="/static/js/layout.js"></script>
    <script>
        // Check URL for mode
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'register') {
            switchMode('register');
        }

        function switchMode(mode) {
            const loginForm = document.getElementById('form-login');
            const regFlow = document.getElementById('form-register-flow');
            const loginTab = document.getElementById('btn-login-tab');
            const regTab = document.getElementById('btn-register-tab');
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');

            const activeTabClass = ['bg-white', 'dark:bg-slate-700', 'shadow-sm', 'text-indigo-600', 'dark:text-indigo-400'];
            const inactiveTabClass = ['text-slate-500', 'hover:text-slate-700', 'dark:hover:text-slate-300'];

            if (mode === 'login') {
                loginForm.classList.add('active');
                regFlow.classList.remove('active');
                
                loginTab.classList.add(...activeTabClass);
                loginTab.classList.remove(...inactiveTabClass);
                regTab.classList.add(...inactiveTabClass);
                regTab.classList.remove(...activeTabClass);

                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Continue your learning journey';
            } else {
                loginForm.classList.remove('active');
                regFlow.classList.add('active');

                regTab.classList.add(...activeTabClass);
                regTab.classList.remove(...inactiveTabClass);
                loginTab.classList.add(...inactiveTabClass);
                loginTab.classList.remove(...activeTabClass);

                title.innerText = 'Create an Account';
                subtitle.innerText = 'Start learning better today';
                resetRegisterPath();
            }
        }

        // --- Simulated Registration flow ---
        let currentRegUsername = "";

        function checkUsername() {
            const unameInput = document.getElementById('reg-username').value.trim();
            if(!unameInput) {
                LayoutManager.showToast('Please enter a username', 'error');
                return;
            }

            // Simulate API Check
            const btn = document.querySelector('#register-step-1 button');
            btn.innerHTML = '<span class="animate-pulse">Checking...</span>';

            setTimeout(() => {
                btn.innerHTML = 'Continue <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>';
                
                // Simulation: if username is "admin" or "taken", fail
                if(unameInput.toLowerCase() === 'admin' || unameInput.toLowerCase() === 'taken') {
                    LayoutManager.showToast('Username is already taken.', 'error');
                } else {
                    currentRegUsername = unameInput;
                    document.getElementById('username-display').innerText = currentRegUsername;
                    document.getElementById('register-step-1').style.display = 'none';
                    document.getElementById('register-step-2').style.display = 'block';
                }
            }, 600);
        }

        function resetRegisterPath() {
            document.getElementById('register-step-1').style.display = 'block';
            document.getElementById('register-step-2').style.display = 'none';
            document.getElementById('reg-username').value = '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('login-submit-btn');
            btn.innerHTML = '<span class="animate-pulse">Logging in...</span>';

            const payload = {
                username: document.getElementById('login-username').value,
                password: document.getElementById('login-password').value
            };

            try {
                const res = await fetch('/authenticate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    LayoutManager.showToast('Login successful!');
                    setTimeout(() => window.location.href = '/', 500); // Redirect to dashboard
                } else {
                    LayoutManager.showToast(data.error || 'Login failed', 'error');
                    btn.innerHTML = 'Login';
                }
            } catch (err) {
                LayoutManager.showToast('Network error', 'error');
                btn.innerHTML = 'Login';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const btn = document.getElementById('reg-submit-btn');
            btn.innerHTML = '<span class="animate-pulse">Creating...</span>';

            const payload = {
                username: currentRegUsername,
                email: document.getElementById('reg-email').value,
                password: document.getElementById('reg-password').value,
                firstName: document.getElementById('reg-first').value,
                lastName: document.getElementById('reg-last').value,
                gender: document.getElementById('reg-gender').value,
                class_study: document.getElementById('reg-class').value,
                dob: document.getElementById('reg-dob').value,
                country: document.getElementById('reg-country').value,
                state: document.getElementById('reg-state').value,
                school: document.getElementById('reg-school').value,
                board: document.getElementById('reg-board').value,
                phone: document.getElementById('reg-phone').value
            };

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok || res.status === 201) {
                    LayoutManager.showToast('Account created! Please log in.');
                    switchMode('login');
                    document.getElementById('login-username').value = currentRegUsername;
                    btn.innerHTML = 'Create Account';
                } else {
                    LayoutManager.showToast(data.error || 'Registration failed', 'error');
                    btn.innerHTML = 'Create Account';
                }
            } catch (err) {
                LayoutManager.showToast('Network error', 'error');
                btn.innerHTML = 'Create Account';
            }
        }
    </script>
</body>
</html>
